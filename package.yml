- hosts: webservers
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Install Node.js
      apt:
        name: nodejs
        state: present

    - name: Install git
      apt:
        name: git
        state: present

    - name: Install Nginx
      apt:
        name: nginx
        state: present